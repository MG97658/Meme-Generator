<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meme Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Meme Generator 😂</h1>
        <p>Create your own memes instantly</p>
    </header>

    <main>

        <!--Meme Preview -->
        <div class="meme-container">
            <div class="meme">
                <img id="memeImage" src="https://i.imgflip.com/1ur9b0.jpg">

                <h2 class="top-text">TOP TEXT</h2>
                <h2 class="bottom-text">BOTTOM TEXT</h2>
            </div>
        </div>

        <!--Controls -->
        <div class="controls">
            <input id="topInput" type="text" placeholder="Top text">
            <input id="bottomInput" type="text" placeholder="Bottom text">

        <select id="memeSelector">
            <option value="https://i.imgflip.com/1ur9b0.jpg">Distracted Boyfriend</option>
            <option value="https://i.imgflip.com/30b1gx.jpg">Drake Hotline</option>
            <option value="https://i.imgflip.com/1ihzfe.jpg">One Does Not Simply</option>
        </select>

            <button id="randomBtn">Random Meme 🎲</button>
            <button id="downloadBtn">Download Meme ⬇️</button>
        </div>
    </main>
<script src="script.js"></script>
</body>
</html>
