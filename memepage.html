<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meme Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Meme Generator 😂</h1>
        <p>Create your own memes instantly</p>
    </header>

    <main>

        <!--Meme Preview -->
        <div class="meme-container">
            <div class="meme">
                <img src="placeholder.jpg" alt="meme">

                <h2 class="top-text">TOP TEXT</h2>
                <h2 class="bottom-text">BOTTOM TEXT</h2>
            </div>
        </div>

        <!--Controls -->
        <div class="controls">
            <input type="text" placeholder="Top text">
            <input type="text" placeholder="Bottom text">

            <selcet>
                <option>Distracted Boyfriend</option>
                <option>Drake Meme</option>
                <option>One Does Not Simply</option>
            </selcet>

            <button>Generate Meme</button>
        </div>
    </main>
</body>
</html>
